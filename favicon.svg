<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-pink">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <circle cx="50" cy="50" r="48" fill="#0e0e1a"/>
  <circle cx="50" cy="50" r="46" fill="none" stroke="#4af3ff" stroke-width="2" opacity="0.7"/>
  <!-- Pentagon (neon pink glow) -->
  <polygon points="50,16 79,37 68,70 32,70 21,37"
    fill="none" stroke="#ff4af3" stroke-width="5" stroke-linejoin="round"
    filter="url(#glow-pink)" opacity="0.5"/>
  <!-- Pentagon (neon blue sharp) -->
  <polygon points="50,16 79,37 68,70 32,70 21,37"
    fill="none" stroke="#4af3ff" stroke-width="2.5" stroke-linejoin="round"
    filter="url(#glow-blue)"/>
  <!-- Cross / spark at center -->
  <line x1="50" y1="38" x2="50" y2="62" stroke="#ffd84a" stroke-width="3" stroke-linecap="round"/>
  <line x1="38" y1="50" x2="62" y2="50" stroke="#ffd84a" stroke-width="3" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="4" fill="#ffd84a"/>
</svg>
